<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7F77DD" />
    <meta name="description" content="WELL LOG — Control de acceso digital para yacimientos petroleros e instalaciones industriales." />
    <meta name="robots" content="noindex, nofollow" />
    <title>WELL LOG — Control de Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Versión del deploy — limpia caché de queries si cambió -->
    <script>
      (function() {
        var APP_VERSION = '2026.05.14';
        var storedVersion = localStorage.getItem('welllog_app_version');
        if (storedVersion && storedVersion !== APP_VERSION) {
          // Nueva versión — limpiar caché de queries pero mantener auth
          var authData = localStorage.getItem('fieldpass-auth');
          var supabaseAuth = null;
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.startsWith('sb-')) {
              supabaseAuth = { key: key, value: localStorage.getItem(key) };
            }
          }
          localStorage.clear();
          if (authData) localStorage.setItem('fieldpass-auth', authData);
          if (supabaseAuth) localStorage.setItem(supabaseAuth.key, supabaseAuth.value);
        }
        localStorage.setItem('welllog_app_version', APP_VERSION);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
